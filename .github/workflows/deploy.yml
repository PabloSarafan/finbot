name: Deploy to CapRover

on:
  push:
    branches:
      - main

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "PROD_DATABASE_URL secret is not set"
            exit 1
          fi
          alembic upgrade head

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE=ghcr.io/pablosarafan/finbot:latest" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

      - name: Deploy to CapRover
        run: |
          npm install -g caprover
          caprover deploy \
            --caproverUrl ${{ secrets.CAPROVER_SERVER }} \
            --appToken ${{ secrets.CAPROVER_APP_TOKEN }} \
            --appName ${{ secrets.CAPROVER_APP_NAME }} \
            --imageName "${{ env.IMAGE }}"
