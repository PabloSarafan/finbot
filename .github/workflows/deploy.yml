name: Deploy to CapRover

on:
  push:
    branches:
      - main

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DB_CONNECT_TIMEOUT_SEC: 30
          DB_COMMAND_TIMEOUT_SEC: 120
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "PROD_DATABASE_URL secret is not set"
            exit 1
          fi
          attempts=5
          delay=10
          for attempt in $(seq 1 "$attempts"); do
            echo "Migration attempt ${attempt}/${attempts}..."
            if alembic upgrade head; then
              echo "Migrations applied successfully"
              exit 0
            fi
            if [ "$attempt" -lt "$attempts" ]; then
              echo "Migration failed, retrying in ${delay}s..."
              sleep "$delay"
            fi
          done
          echo "Migrations failed after ${attempts} attempts (deploy will continue; app migrates on startup)"
          exit 1

  deploy:
    needs: migrate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE=ghcr.io/pablosarafan/finbot:latest" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

      - name: Deploy to CapRover
        run: |
          npm install -g caprover
          caprover deploy \
            --caproverUrl ${{ secrets.CAPROVER_SERVER }} \
            --appToken ${{ secrets.CAPROVER_APP_TOKEN }} \
            --appName ${{ secrets.CAPROVER_APP_NAME }} \
            --imageName "${{ env.IMAGE }}"
