name: Deploy to CapRover

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CapRover CLI
        run: npm install -g caprover

      - name: Deploy
        run: |
          tar -czf deploy.tar.gz --exclude='.git' --exclude='.venv' --exclude='__pycache__' .
          caprover deploy \
            --caproverUrl ${{ secrets.CAPROVER_SERVER }} \
            --appToken ${{ secrets.CAPROVER_APP_TOKEN }} \
            --appName ${{ secrets.CAPROVER_APP_NAME }} \
            --tarFile ./deploy.tar.gz
